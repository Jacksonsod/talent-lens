name: TalentLens API CI

on:
  push:
    branches: [ "main" ]
    paths:
      - 'talent-lens-backend/**'
  pull_request:
    branches: [ "main" ]
    paths:
      - 'talent-lens-backend/**'

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: talent-lens-backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24.x'
          cache: 'npm'
          cache-dependency-path: talent-lens-backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build TypeScript
        run: npm run build