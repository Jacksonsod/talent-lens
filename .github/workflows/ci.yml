name: TalentLens API CI

# This triggers the workflow on pushes or pull requests to the main branch
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x' # Using a stable, modern Node version
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci # npm ci is faster and stricter than npm install for automated environments

      - name: Build TypeScript Code
        run: npm run build