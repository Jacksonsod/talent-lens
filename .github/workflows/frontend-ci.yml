name: Next.js Frontend CI

on:
  # Runs this pipeline every time someone pushes to main
  push:
    branches: [ "main" ]
  # Runs this pipeline on every Pull Request targeting main
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      # 1. Grab the code from the repository
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. Set up the Node.js environment
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' # Standard for modern Next.js
          cache: 'npm'

      # 3. Install dependencies cleanly
      - name: Install Dependencies
        run: npm ci

      # 4. Check for syntax and formatting errors
      - name: Run Linter
        run: npm run lint

      # 5. Run a test build (catches TypeScript and Next.js routing errors)
      - name: Test Production Build
        run: npm run build